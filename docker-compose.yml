version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --lower_case_table_names=1
    restart: always
    environment:
      MYSQL_DATABASE: bklohia
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      # This runs the init.sql file ONLY the first time the database starts empty
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  admin:
    build:
      context: ./bklohia_admin
      dockerfile: Dockerfile
    ports:
      - "3011:3011"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=bklohia
    depends_on:
      - db
    restart: always

  client:
    build:
      context: ./bklohia_react
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=bklohia
    depends_on:
      - db
    restart: always

volumes:
  db_data:
